<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full text-center">
        <h2 class="text-xl font-semibold text-gray-500 mb-2">Analysis Complete</h2>

        <div class="my-6 p-6 bg-blue-50 rounded-lg border border-blue-100">
            <h1 class="text-4xl font-bold text-blue-700 mb-2">{{ label }}</h1>
            <p class="text-gray-600">Confidence: <span class="font-semibold text-gray-800">{{ confidence }}</span></p>
        </div>

        <p class="text-sm text-gray-400 mb-6">Analyzed file: {{ filename }}</p>

        <a href="/" class="inline-block w-full text-white bg-gray-600 hover:bg-gray-700 font-medium rounded-lg text-sm px-5 py-2.5 transition duration-200">
            Analyze Another File
        </a>
    </div>

</body>
</html>
